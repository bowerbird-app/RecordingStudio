name: Pull Request Checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: pull-request-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rubocop:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
        env:
          BUNDLE_GITHUB__COM: x-access-token:${{ secrets.BOWERBIRD_ORG_CI_TOKEN }}

      - name: Run RuboCop
        run: bundle exec rubocop

  test:
    runs-on: ubuntu-latest
    env:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: gem_template_test
      DB_NAME_TEST: gem_template_test
      DB_HOST: localhost
      DB_PORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/gem_template_test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gem_template_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gem_template_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
        env:
          BUNDLE_GITHUB__COM: x-access-token:${{ secrets.BOWERBIRD_ORG_CI_TOKEN }}

      - name: Install dummy app dependencies
        run: bundle install
        working-directory: test/dummy
        env:
          BUNDLE_GITHUB__COM: x-access-token:${{ secrets.BOWERBIRD_ORG_CI_TOKEN }}

      - name: Run database migrations
        run: bundle exec rake db:migrate RAILS_ENV=test
        working-directory: test/dummy

      - name: Build Tailwind assets
        run: bundle exec rails tailwindcss:build
        working-directory: test/dummy
        env:
          RAILS_ENV: test

      - name: Run tests
        run: bundle exec rake test
        env:
          RAILS_ENV: test
